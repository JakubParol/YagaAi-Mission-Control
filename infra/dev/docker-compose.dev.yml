name: mission-control-dev

services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${MC_POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${MC_POSTGRES_USER:-mission_control}
      POSTGRES_PASSWORD: ${MC_POSTGRES_PASSWORD:-mission_control_dev}
    volumes:
      - mission-control-dev-postgres-data:/var/lib/postgresql/data
    ports:
      - "${MC_DEV_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MC_POSTGRES_USER:-mission_control} -d ${MC_POSTGRES_DB:-mission_control}"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: ../local-runtime/worker
      dockerfile: Dockerfile
    environment:
      MC_WORKER_API_HEALTH_URL: ${MC_WORKER_API_HEALTH_URL:-http://host.docker.internal:5000/healthz}
      MC_WORKER_REDIS_HOST: redis
      MC_WORKER_REDIS_PORT: 6379
      MC_WORKER_DAPR_HTTP_URL: http://127.0.0.1:3520
      MC_WORKER_APP_PORT: 8000
      MC_WORKER_PUBLISH_INTERVAL_SECONDS: ${MC_WORKER_PUBLISH_INTERVAL_SECONDS:-15}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)\" && python -c \"import socket; s=socket.create_connection(('redis',6379),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  dapr-placement:
    image: daprio/dapr:${MC_DAPR_VERSION:-1.14.4}
    command: ["./placement", "--port", "50006"]

  dapr-worker:
    image: daprio/daprd:${MC_DAPR_VERSION:-1.14.4}
    network_mode: service:worker
    depends_on:
      worker:
        condition: service_healthy
      dapr-placement:
        condition: service_started
    command:
      - ./daprd
      - --app-id
      - mission-control-worker-dev
      - --app-port
      - "8000"
      - --dapr-http-port
      - "3520"
      - --dapr-grpc-port
      - "50021"
      - --placement-host-address
      - dapr-placement:50006
      - --resources-path
      - /components
    volumes:
      - ../local-runtime/dapr/components:/components:ro

volumes:
  mission-control-dev-postgres-data:
