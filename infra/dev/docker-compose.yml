name: mission-control-local

services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${MC_POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${MC_POSTGRES_USER:-mission_control}
      POSTGRES_PASSWORD: ${MC_POSTGRES_PASSWORD:-mission_control_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${MC_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MC_POSTGRES_USER:-mission_control} -d ${MC_POSTGRES_DB:-mission_control}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: mission-control/api:${MC_IMAGE_TAG:-latest}
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MC_API_POSTGRES_DSN: postgresql+psycopg://${MC_POSTGRES_USER:-mission_control}:${MC_POSTGRES_PASSWORD:-mission_control_dev}@postgres:5432/${MC_POSTGRES_DB:-mission_control}
      MC_API_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:3100","http://127.0.0.1:3100","http://localhost:3001","http://127.0.0.1:3001"]'
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "5100"]
    ports:
      - "${MC_API_PORT:-5000}:5100"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ${MC_OPENCLAW_DEVICE_AUTH_HOST_PATH:-./secrets/openclaw-device-auth.json}:/run/secrets/openclaw-device-auth.json:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as r; r.urlopen('http://127.0.0.1:5100/healthz',timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  web:
    image: mission-control/web:${MC_IMAGE_TAG:-latest}
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        API_URL: http://api:5100
        NEXT_PUBLIC_API_URL: /api
    env_file:
      - .env
    environment:
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      PORT: 3000
      API_URL: http://api:5100
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "${MC_WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/dashboard || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  worker:
    image: python:3.12-alpine
    working_dir: /workspace
    env_file:
      - .env
    environment:
      MC_WORKER_API_HEALTH_URL: http://api:5100/healthz
      MC_WORKER_REDIS_HOST: redis
      MC_WORKER_REDIS_PORT: 6379
      MC_WORKER_DAPR_HTTP_URL: http://127.0.0.1:3520
      MC_WORKER_APP_PORT: 8000
      MC_WORKER_SYNTHETIC_EVENTS_ENABLED: ${MC_WORKER_SYNTHETIC_EVENTS_ENABLED:-false}
      MC_WORKER_PUBLISH_INTERVAL_SECONDS: ${MC_WORKER_PUBLISH_INTERVAL_SECONDS:-15}
    command:
      - /bin/sh
      - -lc
      - |
        python /workspace/infra/dev/worker/app.py
    volumes:
      - ../../:/workspace
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)\" && python -c \"import urllib.request; urllib.request.urlopen('http://api:5100/healthz', timeout=2)\" && python -c \"import socket; s=socket.create_connection(('redis',6379),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  dapr-placement:
    image: daprio/dapr:${MC_DAPR_VERSION:-1.14.4}
    command: ["./placement", "--port", "50006"]

  dapr-api:
    image: daprio/daprd:${MC_DAPR_VERSION:-1.14.4}
    network_mode: service:api
    depends_on:
      api:
        condition: service_healthy
      dapr-placement:
        condition: service_started
    command:
      - ./daprd
      - --app-id
      - mission-control-api
      - --app-port
      - "5100"
      - --dapr-http-port
      - "3500"
      - --dapr-grpc-port
      - "50001"
      - --placement-host-address
      - dapr-placement:50006
      - --resources-path
      - /components
    volumes:
      - ${MC_DAPR_COMPONENTS_PATH:-./dapr/components}:/components:ro

  dapr-web:
    image: daprio/daprd:${MC_DAPR_VERSION:-1.14.4}
    network_mode: service:web
    depends_on:
      web:
        condition: service_healthy
      dapr-placement:
        condition: service_started
    command:
      - ./daprd
      - --app-id
      - mission-control-web
      - --app-port
      - "3000"
      - --dapr-http-port
      - "3510"
      - --dapr-grpc-port
      - "50011"
      - --placement-host-address
      - dapr-placement:50006
      - --resources-path
      - /components
    volumes:
      - ${MC_DAPR_COMPONENTS_PATH:-./dapr/components}:/components:ro

  dapr-worker:
    image: daprio/daprd:${MC_DAPR_VERSION:-1.14.4}
    network_mode: service:worker
    depends_on:
      worker:
        condition: service_healthy
      dapr-placement:
        condition: service_started
    command:
      - ./daprd
      - --app-id
      - mission-control-worker
      - --app-port
      - "8000"
      - --dapr-http-port
      - "3520"
      - --dapr-grpc-port
      - "50021"
      - --placement-host-address
      - dapr-placement:50006
      - --resources-path
      - /components
    volumes:
      - ${MC_DAPR_COMPONENTS_PATH:-./dapr/components}:/components:ro

volumes:
  postgres-data:
